<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Figma UI Compare</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="logo" aria-hidden="true"></div>
    <div>
      <h1>Figma UI Compare</h1>
      <p>Match your live UI to the design</p>
    </div>
  </header>

  <div class="actions">
    <button id="openPanel" class="primary">Open compare panel</button>
    <button id="toggleOverlay">Toggle overlay on page</button>
    <button id="toggleGrid">Toggle layout grid</button>
    <button id="toggleMeasure">Toggle measure tool</button>
  </div>

  <footer>
    <span>v1.0.0</span>
    <a id="helpLink" href="#">How to use</a>
  </footer>

  <script src="popup.js" type="module"></script>
</body>
</html>
